  <style>
    .scanline { --scanline-z: 2; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: url('res/images/background-web-v2.jpg') no-repeat center center;
      background-size: cover;
      background-attachment: scroll;
      font-family: var(--font);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      animation: fade-up 1.5s ease-out both;
      animation-delay: 0.3s;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .manifesto {
      max-width: 600px;
      margin: 0 auto 2.5rem;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: #c0c0c0;
      line-height: 1.7;
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 1.5rem 2rem;
      border: 1px solid rgba(var(--gold-rgb), 0.08);
      border-radius: 2px;
      position: relative;
    }

    .manifesto-sizer {
      visibility: hidden;
      white-space: pre-wrap;
    }

    .manifesto-text {
      position: absolute;
      inset: 1.5rem 2rem;
    }

    .manifesto .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--gold);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .cta-group {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 1rem 2rem;
      border: 2px solid var(--gold);
      color: var(--gold);
      text-decoration: none;
      font-family: var(--font);
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      transition: all 0.3s ease;
      position: relative;
      background: rgba(0, 0, 0, 0.6);
      animation: cta-glitch-in 1.5s steps(1) 0.3s both, pulse-glow 3s ease-in-out 2s infinite;
    }

    .cta svg {
      width: 1.2em;
      height: 1.2em;
      fill: currentColor;
      flex-shrink: 0;
    }

    @keyframes cta-glitch-in {
      0%   { opacity: 0; transform: translate(0, 0); filter: none; }
      5%   { opacity: 0.7; transform: translate(-4px, 2px); filter: hue-rotate(90deg); clip-path: inset(20% 0 30% 0); }
      8%   { opacity: 0; transform: translate(0, 0); }
      15%  { opacity: 0.5; transform: translate(3px, -1px); filter: hue-rotate(-60deg); clip-path: inset(50% 0 10% 0); }
      18%  { opacity: 0; }
      25%  { opacity: 0.8; transform: translate(-2px, 3px); filter: hue-rotate(45deg); clip-path: inset(10% 0 40% 0); }
      28%  { opacity: 0; }
      35%  { opacity: 0.6; transform: translate(5px, -2px); filter: hue-rotate(-30deg); clip-path: inset(40% 0 20% 0); }
      38%  { opacity: 0; }
      48%  { opacity: 0.9; transform: translate(-1px, 1px); filter: hue-rotate(15deg); clip-path: inset(5% 0 5% 0); }
      50%  { opacity: 0; }
      60%  { opacity: 0.85; transform: translate(2px, -1px); filter: none; clip-path: inset(0 0 30% 0); }
      62%  { opacity: 1; transform: translate(-1px, 0); clip-path: inset(0 0 0 0); }
      65%  { opacity: 0.9; transform: translate(1px, 1px); clip-path: inset(15% 0 0 0); }
      70%  { opacity: 1; transform: translate(0, 0); filter: none; clip-path: inset(0); }
      75%  { opacity: 0.95; transform: translate(-1px, 0); }
      80%  { opacity: 1; transform: translate(0, 0); }
      85%  { opacity: 0.97; transform: translate(1px, 0); }
      90%  { opacity: 1; transform: translate(0, 0); clip-path: inset(0); filter: none; }
      100% { opacity: 1; transform: translate(0, 0); clip-path: inset(0); filter: none; }
    }

    @keyframes pulse-glow {
      0% { opacity: 1; box-shadow: 0 0 5px rgba(var(--gold-rgb), 0.1); }
      50% { opacity: 1; box-shadow: 0 0 20px rgba(var(--gold-rgb), 0.25), 0 0 40px rgba(var(--gold-rgb), 0.1); }
      100% { opacity: 1; box-shadow: 0 0 5px rgba(var(--gold-rgb), 0.1); }
    }

    .cta:hover {
      background: var(--gold);
      color: #000;
      box-shadow: 0 0 30px rgba(var(--gold-rgb), 0.4), 0 0 60px rgba(var(--gold-rgb), 0.15);
      animation: none;
      opacity: 1;
    }

    .cta::before,
    .cta::after {
      content: '[ ';
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .cta::after {
      content: ' ]';
    }

    .cta:hover::before,
    .cta:hover::after {
      opacity: 1;
    }

    /* Hero video */
    .hero-video-wrapper {
      position: relative;
      width: 90%;
      max-width: 720px;
      margin: 2rem auto 0;
      border: 1px solid rgba(var(--gold-rgb), 0.3);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.6), 0 0 10px rgba(var(--gold-rgb), 0.1);
      cursor: pointer;
      overflow: hidden;
    }

    .hero-video-wrapper {
      aspect-ratio: 16 / 9;
    }

    .hero-video-wrapper iframe {
      display: block;
      width: 100%;
      height: 100%;
    }

    @media (max-width: 768px) {
      .hero-video-wrapper {
        width: 95%;
      }
    }

    /* Scroll indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: indicator-glitch-in 2s steps(1) 4s both;
      cursor: pointer;
      z-index: 3;
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    @keyframes indicator-glitch-in {
      0%   { opacity: 0; transform: translateX(-50%); }
      5%   { opacity: 0.7; transform: translateX(calc(-50% - 4px)); filter: hue-rotate(90deg); clip-path: inset(20% 0 30% 0); }
      8%   { opacity: 0; transform: translateX(-50%); }
      15%  { opacity: 0.5; transform: translateX(calc(-50% + 3px)); filter: hue-rotate(-60deg); clip-path: inset(50% 0 10% 0); }
      18%  { opacity: 0; }
      28%  { opacity: 0.8; transform: translateX(calc(-50% - 2px)); filter: hue-rotate(45deg); clip-path: inset(10% 0 40% 0); }
      31%  { opacity: 0; }
      42%  { opacity: 0.6; transform: translateX(calc(-50% + 5px)); filter: hue-rotate(-30deg); clip-path: inset(40% 0 20% 0); }
      45%  { opacity: 0; }
      55%  { opacity: 0.9; transform: translateX(calc(-50% - 1px)); filter: hue-rotate(15deg); clip-path: inset(5% 0 5% 0); }
      58%  { opacity: 0; }
      68%  { opacity: 0.85; transform: translateX(calc(-50% + 2px)); clip-path: inset(0 0 30% 0); }
      72%  { opacity: 1; transform: translateX(calc(-50% - 1px)); clip-path: inset(0); }
      76%  { opacity: 0.9; transform: translateX(calc(-50% + 1px)); clip-path: inset(15% 0 0 0); }
      82%  { opacity: 1; transform: translateX(-50%); filter: none; clip-path: none; }
      88%  { opacity: 0.95; transform: translateX(calc(-50% - 1px)); }
      100% { opacity: 1; transform: translateX(-50%); clip-path: none; filter: none; }
    }

    .scroll-indicator span {
      color: rgba(var(--gold-rgb), 0.8);
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: bold;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(var(--gold-rgb), 0.3);
    }

    .scroll-chevron-wrapper {
      animation: scroll-bounce 2s ease-in-out infinite;
    }

    .scroll-chevron {
      width: 24px;
      height: 24px;
      border-right: 2px solid rgba(var(--gold-rgb), 0.5);
      border-bottom: 2px solid rgba(var(--gold-rgb), 0.5);
      transform: rotate(45deg);
    }

    @keyframes scroll-bounce {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(6px); opacity: 1; }
    }

    .scroll-indicator:hover span,
    .scroll-indicator:hover .scroll-chevron {
      color: rgba(var(--gold-rgb), 0.8);
      border-color: rgba(var(--gold-rgb), 0.8);
    }

    /* Particle network canvas */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      body {
        background-image: url('res/images/background-mobile-v2.jpg');
        min-height: 100svh;
      }

      .container {
        padding: 1.5rem;
        min-height: 100svh;
        justify-content: center;
        overflow: hidden;
      }

      .cta {
        padding: 0.8rem 1.5rem;
        font-size: 0.85rem;
      }

      .cta-group {
        gap: 1rem;
      }

      .hero-video-wrapper {
        margin-top: 1rem;
      }

      .scroll-indicator {
        bottom: 1rem;
      }
    }

    /* Hidden link — nearly invisible text with random shimmer */
    .ghost-link {
      position: absolute;
      color: rgba(255, 255, 255, 0.03);
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      transition: color 0.5s ease, text-shadow 0.5s ease;
      cursor: default;
      animation: ghost-shimmer var(--shimmer-duration, 8s) ease-in-out infinite;
      animation-delay: var(--shimmer-delay, 0s);
    }

    .ghost-link:hover {
      color: rgba(var(--gold-rgb), 0.6);
      text-shadow: 0 0 10px rgba(var(--gold-rgb), 0.3);
      cursor: pointer;
      animation: none;
    }

    @keyframes ghost-shimmer {
      0%, 85%, 100% { color: rgba(255, 255, 255, 0.03); text-shadow: none; }
      90% { color: rgba(var(--gold-rgb), 0.25); text-shadow: 0 0 6px rgba(var(--gold-rgb), 0.15); }
      93% { color: rgba(255, 255, 255, 0.03); text-shadow: none; }
      95% { color: rgba(var(--gold-rgb), 0.15); text-shadow: 0 0 4px rgba(var(--gold-rgb), 0.1); }
    }

    .ghost-1 {
      bottom: 12%;
      left: 8%;
      --shimmer-duration: 7s;
      --shimmer-delay: 2s;
    }

    .ghost-2 {
      top: 15%;
      right: 6%;
      --shimmer-duration: 11s;
      --shimmer-delay: 5s;
    }

    /* Hidden link — glitch patch with random flashes */
    .glitch-zone {
      position: absolute;
      width: 60px;
      height: 40px;
      opacity: 0;
      cursor: default;
      z-index: 1;
      animation: glitch-appear 6s ease-in-out infinite;
      animation-delay: 3s;
    }

    .glitch-zone:hover {
      opacity: 1;
      cursor: pointer;
      animation: none;
    }

    .glitch-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        rgba(var(--gold-rgb), 0.15) 1px,
        transparent 2px,
        transparent 4px
      );
      animation: glitch-flicker 0.15s infinite;
    }

    @keyframes glitch-appear {
      0%, 88%, 100% { opacity: 0; }
      90% { opacity: 0.7; transform: translate(-1px, 2px); }
      91% { opacity: 0; }
      93% { opacity: 0.5; transform: translate(2px, -1px); }
      94% { opacity: 0; }
    }

    @keyframes glitch-flicker {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-2px); }
      75% { transform: translateX(2px); }
    }

    .glitch-1 {
      top: 30%;
      left: 15%;
    }

    /* Hidden element — revealed by Konami-style key sequence */
    .secret-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.95);
      border-top: 1px solid var(--gold);
      padding: 1.5rem;
      text-align: center;
      z-index: 10;
      transform: translateY(100%);
      transition: transform 0.5s ease;
      font-size: 0.85rem;
      color: #888;
    }

    .secret-panel.revealed {
      transform: translateY(0);
    }

    .secret-panel a {
      color: var(--gold);
      text-decoration: none;
      border-bottom: 1px solid var(--gold);
    }

    .secret-panel a:hover {
      color: #fff;
    }

    .evidence-preview {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      padding: 3rem 2rem;
      margin: 0 auto;
      animation: fade-up 1s ease-out both;
    }

    .evidence-title {
      text-align: center;
      color: var(--gold);
      font-family: var(--font);
      font-size: clamp(0.8rem, 2vw, 1rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .evidence-title.visible {
      opacity: 1;
    }

    .evidence-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .evidence-card {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(var(--gold-rgb), 0.15);
      border-left: 3px solid rgba(var(--gold-rgb), 0.4);
      padding: 1.2rem 1.5rem;
      border-radius: 2px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .evidence-card.visible {
      opacity: 1;
      transform: translateY(0) rotate(var(--rotation, 0deg));
    }

    .evidence-card:hover {
      border-color: rgba(var(--gold-rgb), 0.4);
      box-shadow: 0 0 20px rgba(var(--gold-rgb), 0.1);
      transform: translateY(-2px) rotate(0deg);
    }

    .evidence-card h3 {
      color: var(--gold);
      font-size: 0.85rem;
      font-family: var(--font);
      margin-bottom: 0.5rem;
      line-height: 1.4;
      text-transform: uppercase;
    }

    .evidence-card p {
      color: #888;
      font-size: 0.75rem;
      font-family: var(--font);
      line-height: 1.5;
    }

    .evidence-card .card-date {
      color: #555;
      font-size: 0.65rem;
      font-family: var(--font);
      margin-top: 0.8rem;
      letter-spacing: 0.1em;
    }

    .evidence-card .voice-indicator {
      display: inline-block;
      color: var(--gold);
      font-size: 0.65rem;
      margin-top: 0.5rem;
      opacity: 0.6;
    }

    .see-more {
      display: block;
      text-align: center;
      color: var(--gold);
      font-family: var(--font);
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      text-decoration: none;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 1rem;
      border: 1px solid rgba(var(--gold-rgb), 0.2);
      background: rgba(0, 0, 0, 0.3);
      opacity: 0;
      transition: opacity 0.8s ease, background 0.3s ease, border-color 0.3s ease;
    }

    .see-more.visible {
      opacity: 1;
    }

    .see-more:hover {
      background: rgba(var(--gold-rgb), 0.1);
      border-color: rgba(var(--gold-rgb), 0.5);
    }

    @media (max-width: 768px) {
      .evidence-cards {
        grid-template-columns: 1fr;
      }

      .evidence-preview {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>

  <script>

    // Typewriter effect
    (() => {
      const text = "Listen \u2014 I don't have much time. They're watching this page RIGHT NOW. Everything they don't want you to know? The cover-ups, the deepfakes, the signals hidden in plain sight? I'm sending it all. Raw. Unfiltered. Before they shut me down. If you're seeing this... you were meant to find it.";
      const sizer = document.getElementById('manifestoSizer');
      const el = document.getElementById('manifestoText');
      const cursor = el.querySelector('.cursor');
      sizer.textContent = text;
      let i = 0;

      function type() {
        if (i < text.length) {
          cursor.before(document.createTextNode(text[i]));
          i++;
          const delay = text[i - 1] === '.' || text[i - 1] === '?' ? 180 :
                        text[i - 1] === ',' || text[i - 1] === '\u2014' ? 120 :
                        25 + Math.random() * 35;
          setTimeout(type, delay);
        } else {
          setTimeout(() => cursor.remove(), 2000);
        }
      }

      setTimeout(type, 800);
    })();


    // Reveal secret panel by typing "ron"
    let keys = '';
    document.addEventListener('keydown', (e) => {
      keys += e.key.toLowerCase();
      if (keys.length > 10) keys = keys.slice(-10);
      if (keys.includes('ron')) {
        document.getElementById('secretPanel').classList.add('revealed');
        keys = '';
      }
    });
  </script>

  <script src="res/js/cache.js"></script>
  <script src="res/js/icons.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="res/js/supabase-config.js"></script>
  <script>
    // Hide scroll indicator on scroll
    (() => {
      const indicator = document.getElementById('scrollIndicator');
      if (!indicator) return;
      window.addEventListener('scroll', () => {
        if (window.scrollY > 100) {
          indicator.style.opacity = '0';
          indicator.style.pointerEvents = 'none';
        }
      }, { passive: true });
    })();

    // Fetch and render evidence preview cards
    (async () => {
      try {
        const CACHE_KEY = 'evidence_preview_cache';
        const supabaseClient = window.SUPABASE_CLIENT;
        let stories = null;

        // Check cache first
        const cachedResult = window.SessionCache.get(CACHE_KEY);
        if (cachedResult) {
          stories = cachedResult.data;
        }

        // Fetch if no cache
        if (!stories) {
          const { data, error } = await supabaseClient
            .from('stories')
            .select('id, post_title, content_summary, voice_url, created_at')
            .order('created_at', { ascending: false })
            .limit(3);

          if (error || !data || data.length === 0) return;
          stories = data;

          window.SessionCache.set(CACHE_KEY, { data: stories });
        }

        if (!stories || stories.length === 0) return;

        const container = document.getElementById('evidenceCards');

        stories.forEach((story, i) => {
          const card = document.createElement('a');
          card.href = `board.html#story-${story.id}`;
          card.className = 'evidence-card';
          card.style.setProperty('--rotation', `${-1.5 + Math.random() * 3}deg`);

          const title = story.post_title.length > 80
            ? story.post_title.slice(0, 80) + '...'
            : story.post_title;
          const summary = story.content_summary.length > 120
            ? story.content_summary.slice(0, 120) + '...'
            : story.content_summary;
          const date = new Date(story.created_at).toLocaleDateString('en-US', {
            month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC'
          });

          const h3 = document.createElement('h3');
          h3.textContent = title;
          card.appendChild(h3);

          const p = document.createElement('p');
          p.textContent = summary;
          card.appendChild(p);

          if (story.voice_url) {
            const voice = document.createElement('span');
            voice.className = 'voice-indicator';
            voice.innerHTML = '&#9654; VOICE NOTE AVAILABLE';
            card.appendChild(voice);
          }

          const dateDiv = document.createElement('div');
          dateDiv.className = 'card-date';
          dateDiv.textContent = date;
          card.appendChild(dateDiv);

          container.appendChild(card);
        });

        // Intersection Observer for fade-in
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const el = entry.target;
              if (el.id === 'evidenceTitle' || el.id === 'seeMore') {
                el.classList.add('visible');
              } else if (el.classList.contains('evidence-card')) {
                setTimeout(() => el.classList.add('visible'),
                  Array.from(el.parentNode.children).indexOf(el) * 150);
              }
              observer.unobserve(el);
            }
          });
        }, { threshold: 0.1 });

        document.getElementById('evidenceTitle') && observer.observe(document.getElementById('evidenceTitle'));
        document.querySelectorAll('.evidence-card').forEach(c => observer.observe(c));
        document.getElementById('seeMore') && observer.observe(document.getElementById('seeMore'));

      } catch (e) {
        console.error('Failed to load evidence:', e);
      }
    })();
  </script>

  <script src="res/js/particles.js"></script>
</body>
