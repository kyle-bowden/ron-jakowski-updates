<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Reality Protocol — Brotherhood of Awareness</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" href="res/images/favicon.png" type="image/png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: url('res/images/background-web-v2.jpg') no-repeat center center;
      background-size: cover;
      background-attachment: scroll;
      font-family: 'Courier New', monospace;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      animation: fade-up 1.5s ease-out both;
      animation-delay: 0.3s;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .manifesto {
      max-width: 600px;
      margin: 0 auto 2.5rem;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      color: #c0c0c0;
      line-height: 1.7;
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 1.5rem 2rem;
      border: 1px solid rgba(212, 175, 55, 0.08);
      border-radius: 2px;
    }

    .manifesto .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #d4af37;
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.7s step-end infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .cta {
      display: inline-block;
      padding: 1rem 3rem;
      border: 2px solid #d4af37;
      color: #d4af37;
      text-decoration: none;
      font-family: 'Courier New', monospace;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      transition: all 0.3s ease;
      position: relative;
      background: rgba(0, 0, 0, 0.6);
      animation: cta-glitch-in 1.5s steps(1) 0.3s both, pulse-glow 3s ease-in-out 2s infinite;
    }

    @keyframes cta-glitch-in {
      0%   { opacity: 0; transform: translate(0, 0); filter: none; }
      5%   { opacity: 0.7; transform: translate(-4px, 2px); filter: hue-rotate(90deg); clip-path: inset(20% 0 30% 0); }
      8%   { opacity: 0; transform: translate(0, 0); }
      15%  { opacity: 0.5; transform: translate(3px, -1px); filter: hue-rotate(-60deg); clip-path: inset(50% 0 10% 0); }
      18%  { opacity: 0; }
      25%  { opacity: 0.8; transform: translate(-2px, 3px); filter: hue-rotate(45deg); clip-path: inset(10% 0 40% 0); }
      28%  { opacity: 0; }
      35%  { opacity: 0.6; transform: translate(5px, -2px); filter: hue-rotate(-30deg); clip-path: inset(40% 0 20% 0); }
      38%  { opacity: 0; }
      48%  { opacity: 0.9; transform: translate(-1px, 1px); filter: hue-rotate(15deg); clip-path: inset(5% 0 5% 0); }
      50%  { opacity: 0; }
      60%  { opacity: 0.85; transform: translate(2px, -1px); filter: none; clip-path: inset(0 0 30% 0); }
      62%  { opacity: 1; transform: translate(-1px, 0); clip-path: inset(0 0 0 0); }
      65%  { opacity: 0.9; transform: translate(1px, 1px); clip-path: inset(15% 0 0 0); }
      70%  { opacity: 1; transform: translate(0, 0); filter: none; clip-path: inset(0); }
      75%  { opacity: 0.95; transform: translate(-1px, 0); }
      80%  { opacity: 1; transform: translate(0, 0); }
      85%  { opacity: 0.97; transform: translate(1px, 0); }
      90%  { opacity: 1; transform: translate(0, 0); clip-path: inset(0); filter: none; }
      100% { opacity: 1; transform: translate(0, 0); clip-path: inset(0); filter: none; }
    }

    @keyframes pulse-glow {
      0% { opacity: 1; box-shadow: 0 0 5px rgba(212, 175, 55, 0.1); }
      50% { opacity: 1; box-shadow: 0 0 20px rgba(212, 175, 55, 0.25), 0 0 40px rgba(212, 175, 55, 0.1); }
      100% { opacity: 1; box-shadow: 0 0 5px rgba(212, 175, 55, 0.1); }
    }

    .cta:hover {
      background: #d4af37;
      color: #000;
      box-shadow: 0 0 30px rgba(212, 175, 55, 0.4), 0 0 60px rgba(212, 175, 55, 0.15);
      animation: none;
      opacity: 1;
    }

    .cta::before,
    .cta::after {
      content: '[ ';
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .cta::after {
      content: ' ]';
    }

    .cta:hover::before,
    .cta:hover::after {
      opacity: 1;
    }

    /* Scroll indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      opacity: 0;
      animation: indicator-in 1s ease-out 4s forwards;
      cursor: pointer;
      z-index: 3;
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    @keyframes indicator-in {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    .scroll-indicator span {
      color: rgba(212, 175, 55, 0.5);
      font-family: 'Courier New', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .scroll-chevron-wrapper {
      animation: scroll-bounce 2s ease-in-out infinite;
    }

    .scroll-chevron {
      width: 24px;
      height: 24px;
      border-right: 2px solid rgba(212, 175, 55, 0.5);
      border-bottom: 2px solid rgba(212, 175, 55, 0.5);
      transform: rotate(45deg);
    }

    @keyframes scroll-bounce {
      0%, 100% { transform: translateY(0); opacity: 0.5; }
      50% { transform: translateY(6px); opacity: 1; }
    }

    .scroll-indicator:hover span,
    .scroll-indicator:hover .scroll-chevron {
      color: rgba(212, 175, 55, 0.8);
      border-color: rgba(212, 175, 55, 0.8);
    }

    /* Particle network canvas */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      body {
        background-image: url('res/images/background-mobile-v2.jpg');
        min-height: 100svh;
      }

      .container {
        padding: 1.5rem;
      }

      .cta {
        padding: 0.8rem 2rem;
      }
    }

    /* Hidden link — nearly invisible text with random shimmer */
    .ghost-link {
      position: absolute;
      color: rgba(255, 255, 255, 0.03);
      text-decoration: none;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      transition: color 0.5s ease, text-shadow 0.5s ease;
      cursor: default;
      animation: ghost-shimmer var(--shimmer-duration, 8s) ease-in-out infinite;
      animation-delay: var(--shimmer-delay, 0s);
    }

    .ghost-link:hover {
      color: rgba(212, 175, 55, 0.6);
      text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
      cursor: pointer;
      animation: none;
    }

    @keyframes ghost-shimmer {
      0%, 85%, 100% { color: rgba(255, 255, 255, 0.03); text-shadow: none; }
      90% { color: rgba(212, 175, 55, 0.25); text-shadow: 0 0 6px rgba(212, 175, 55, 0.15); }
      93% { color: rgba(255, 255, 255, 0.03); text-shadow: none; }
      95% { color: rgba(212, 175, 55, 0.15); text-shadow: 0 0 4px rgba(212, 175, 55, 0.1); }
    }

    .ghost-1 {
      bottom: 12%;
      left: 8%;
      --shimmer-duration: 7s;
      --shimmer-delay: 2s;
    }

    .ghost-2 {
      top: 15%;
      right: 6%;
      --shimmer-duration: 11s;
      --shimmer-delay: 5s;
    }

    /* Hidden link — glitch patch with random flashes */
    .glitch-zone {
      position: absolute;
      width: 60px;
      height: 40px;
      opacity: 0;
      cursor: default;
      z-index: 1;
      animation: glitch-appear 6s ease-in-out infinite;
      animation-delay: 3s;
    }

    .glitch-zone:hover {
      opacity: 1;
      cursor: pointer;
      animation: none;
    }

    .glitch-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        rgba(212, 175, 55, 0.15) 1px,
        transparent 2px,
        transparent 4px
      );
      animation: glitch-flicker 0.15s infinite;
    }

    @keyframes glitch-appear {
      0%, 88%, 100% { opacity: 0; }
      90% { opacity: 0.7; transform: translate(-1px, 2px); }
      91% { opacity: 0; }
      93% { opacity: 0.5; transform: translate(2px, -1px); }
      94% { opacity: 0; }
    }

    @keyframes glitch-flicker {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-2px); }
      75% { transform: translateX(2px); }
    }

    .glitch-1 {
      top: 30%;
      left: 15%;
    }

    /* Hidden element — revealed by Konami-style key sequence */
    .secret-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0, 0, 0, 0.95);
      border-top: 1px solid #d4af37;
      padding: 1.5rem;
      text-align: center;
      z-index: 10;
      transform: translateY(100%);
      transition: transform 0.5s ease;
      font-size: 0.85rem;
      color: #888;
    }

    .secret-panel.revealed {
      transform: translateY(0);
    }

    .secret-panel a {
      color: #d4af37;
      text-decoration: none;
      border-bottom: 1px solid #d4af37;
    }

    .secret-panel a:hover {
      color: #fff;
    }

    .scanline {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.08) 2px,
        rgba(0, 0, 0, 0.08) 4px
      );
    }

    .evidence-preview {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 900px;
      padding: 3rem 2rem;
      margin: 0 auto;
      animation: fade-up 1s ease-out both;
    }

    .evidence-title {
      text-align: center;
      color: #d4af37;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.8rem, 2vw, 1rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 2rem;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    .evidence-title.visible {
      opacity: 1;
    }

    .evidence-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .evidence-card {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(212, 175, 55, 0.15);
      border-left: 3px solid rgba(212, 175, 55, 0.4);
      padding: 1.2rem 1.5rem;
      border-radius: 2px;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.5s ease;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .evidence-card.visible {
      opacity: 1;
      transform: translateY(0) rotate(var(--rotation, 0deg));
    }

    .evidence-card:hover {
      border-color: rgba(212, 175, 55, 0.4);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
      transform: translateY(-2px) rotate(0deg);
    }

    .evidence-card h3 {
      color: #d4af37;
      font-size: 0.85rem;
      font-family: 'Courier New', monospace;
      margin-bottom: 0.5rem;
      line-height: 1.4;
      text-transform: uppercase;
    }

    .evidence-card p {
      color: #888;
      font-size: 0.75rem;
      font-family: 'Courier New', monospace;
      line-height: 1.5;
    }

    .evidence-card .card-date {
      color: #555;
      font-size: 0.65rem;
      font-family: 'Courier New', monospace;
      margin-top: 0.8rem;
      letter-spacing: 0.1em;
    }

    .evidence-card .voice-indicator {
      display: inline-block;
      color: #d4af37;
      font-size: 0.65rem;
      margin-top: 0.5rem;
      opacity: 0.6;
    }

    .see-more {
      display: block;
      text-align: center;
      color: #d4af37;
      font-family: 'Courier New', monospace;
      font-size: clamp(0.8rem, 2vw, 0.95rem);
      text-decoration: none;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 1rem;
      border: 1px solid rgba(212, 175, 55, 0.2);
      background: rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
      opacity: 0;
      transition: opacity 0.8s ease, background 0.3s ease, border-color 0.3s ease;
    }

    .see-more.visible {
      opacity: 1;
    }

    .see-more:hover {
      background: rgba(212, 175, 55, 0.1);
      border-color: rgba(212, 175, 55, 0.5);
    }

    @media (max-width: 768px) {
      .evidence-cards {
        grid-template-columns: 1fr;
      }

      .evidence-preview {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="scanline"></div>
  <div class="container">
    <p class="manifesto" id="manifesto"><span class="cursor"></span></p>
    <a href="https://t.me/ronjakowski" class="cta" target="_blank" rel="noopener">Enter the Protocol</a>
    <a href="#evidencePreview" class="scroll-indicator" id="scrollIndicator">
      <span>intercepted files below</span>
      <div class="scroll-chevron-wrapper"><div class="scroll-chevron"></div></div>
    </a>
  </div>

  <section class="evidence-preview" id="evidencePreview">
    <h2 class="evidence-title" id="evidenceTitle">INTERCEPTED TRANSMISSIONS</h2>
    <div class="evidence-cards" id="evidenceCards">
      <!-- Populated by JS -->
    </div>
    <a href="board.html" class="see-more" id="seeMore">See more truth &rarr;</a>
  </section>

  <!-- Hidden: ghost text links -->
  <a href="autobiography.html" class="ghost-link ghost-1">who is cal?</a>
  <a href="autobiography.html" class="ghost-link ghost-2">find the archive</a>

  <!-- Hidden: glitch zone -->
  <a href="autobiography.html" class="glitch-zone glitch-1" title=""></a>

  <!-- Hidden: secret panel (type "ron") -->
  <div class="secret-panel" id="secretPanel">
    You found it. Ron left a trail. Cal picked it up.<br>
    <a href="autobiography.html">Read Cal's story &rarr;</a>
  </div>

  <script>
    // Typewriter effect
    (() => {
      const text = "Listen \u2014 I don't have much time. They're watching this page RIGHT NOW. Everything they don't want you to know? The cover-ups, the deepfakes, the signals hidden in plain sight? I'm sending it all. Raw. Unfiltered. Before they shut me down. If you're seeing this... you were meant to find it.";
      const el = document.getElementById('manifesto');
      const cursor = el.querySelector('.cursor');
      let i = 0;

      function type() {
        if (i < text.length) {
          cursor.before(document.createTextNode(text[i]));
          i++;
          const delay = text[i - 1] === '.' || text[i - 1] === '?' ? 180 :
                        text[i - 1] === ',' || text[i - 1] === '\u2014' ? 120 :
                        25 + Math.random() * 35;
          setTimeout(type, delay);
        } else {
          setTimeout(() => cursor.remove(), 2000);
        }
      }

      setTimeout(type, 800);
    })();

    // Particle network
    (() => {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let w, h, particles;

      function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }

      function init() {
        resize();
        const count = Math.floor((w * h) / 25000);
        particles = Array.from({ length: count }, () => ({
          x: Math.random() * w,
          y: Math.random() * h,
          vx: (Math.random() - 0.5) * 0.3,
          vy: (Math.random() - 0.5) * 0.3,
          r: Math.random() * 1.5 + 0.5,
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, w, h);

        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = w;
          if (p.x > w) p.x = 0;
          if (p.y < 0) p.y = h;
          if (p.y > h) p.y = 0;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(212, 175, 55, 0.15)';
          ctx.fill();
        }

        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = dx * dx + dy * dy;
            if (dist < 15000) {
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(212, 175, 55, ${0.06 * (1 - dist / 15000)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }

        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); });
      init();
      draw();
    })();

    // Reveal secret panel by typing "ron"
    let keys = '';
    document.addEventListener('keydown', (e) => {
      keys += e.key.toLowerCase();
      if (keys.length > 10) keys = keys.slice(-10);
      if (keys.includes('ron')) {
        document.getElementById('secretPanel').classList.add('revealed');
        keys = '';
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="res/js/supabase-config.js"></script>
  <script>
    // Hide scroll indicator on scroll
    (() => {
      const indicator = document.getElementById('scrollIndicator');
      if (!indicator) return;
      window.addEventListener('scroll', () => {
        if (window.scrollY > 100) {
          indicator.style.opacity = '0';
          indicator.style.pointerEvents = 'none';
        }
      }, { passive: true });
    })();

    // Fetch and render evidence preview cards
    (async () => {
      try {
        const sb = window.supabase.createClient(
          window.SUPABASE_CONFIG.url,
          window.SUPABASE_CONFIG.anonKey
        );

        const { data: stories, error } = await sb
          .from('stories')
          .select('id, post_title, content_summary, voice_url, created_at')
          .order('created_at', { ascending: false })
          .limit(3);

        if (error || !stories || stories.length === 0) return;

        const container = document.getElementById('evidenceCards');

        stories.forEach((story, i) => {
          const card = document.createElement('a');
          card.href = `board.html#story-${story.id}`;
          card.className = 'evidence-card';
          card.style.setProperty('--rotation', `${-1.5 + Math.random() * 3}deg`);

          const title = story.post_title.length > 80
            ? story.post_title.slice(0, 80) + '...'
            : story.post_title;
          const summary = story.content_summary.length > 120
            ? story.content_summary.slice(0, 120) + '...'
            : story.content_summary;
          const date = new Date(story.created_at).toLocaleDateString('en-US', {
            month: 'short', day: 'numeric', year: 'numeric'
          });

          const h3 = document.createElement('h3');
          h3.textContent = title;
          card.appendChild(h3);

          const p = document.createElement('p');
          p.textContent = summary;
          card.appendChild(p);

          if (story.voice_url) {
            const voice = document.createElement('span');
            voice.className = 'voice-indicator';
            voice.innerHTML = '&#9654; VOICE NOTE AVAILABLE';
            card.appendChild(voice);
          }

          const dateDiv = document.createElement('div');
          dateDiv.className = 'card-date';
          dateDiv.textContent = date;
          card.appendChild(dateDiv);

          container.appendChild(card);
        });

        // Intersection Observer for fade-in
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const el = entry.target;
              if (el.id === 'evidenceTitle' || el.id === 'seeMore') {
                el.classList.add('visible');
              } else if (el.classList.contains('evidence-card')) {
                setTimeout(() => el.classList.add('visible'),
                  Array.from(el.parentNode.children).indexOf(el) * 150);
              }
              observer.unobserve(el);
            }
          });
        }, { threshold: 0.1 });

        document.getElementById('evidenceTitle') && observer.observe(document.getElementById('evidenceTitle'));
        document.querySelectorAll('.evidence-card').forEach(c => observer.observe(c));
        document.getElementById('seeMore') && observer.observe(document.getElementById('seeMore'));

      } catch (e) {
        console.error('Failed to load evidence:', e);
      }
    })();
  </script>
</body>
</html>
